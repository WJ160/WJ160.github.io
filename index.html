<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人博客</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{max-width:800px;margin:20px auto;padding:0 15px;background:#f5f5f5;font-family:Arial}
        .head{padding:25px;text-align:center;background:#667eea;color:#fff;border-radius:8px}
        .main{margin-top:18px;padding:25px;background:#fff;border-radius:8px}
        .img-box{display:flex;gap:20px;margin:20px 0}
        .card{flex:1;padding:12px;background:#f7f7f7;border-radius:6px;text-align:center}
        img{width:100%;border-radius:4px;margin-top:12px}
        .path{font-family:consolas;font-size:12px;color:#555;margin:6px 0}
        footer{text-align:center;margin-top:20px;color:#666;font-size:14px}
        ul{margin:10px 0 10px 20px}
    </style>
</head>
<body>
    <div class="head">
        <h1>我的技术博客</h1>
        <p>学习记录与分享</p>
    </div>
    <div class="main">
        <h2>关于本站</h2>
        <p>本站基于GitHub Pages搭建静态博客。</p>

        <h2 style="margin-top:20px">图片路径演示</h2>
        <div class="img-box">
            <div class="card">
                <img src="https://picsum.photos/id/1/300/200">
                <div class="path">绝对路径：https://picsum.photos/id/1/300/200</div>

                <img src="https://picsum.photos/id/10/300/200">
                <div class="path">绝对路径：https://picsum.photos/id/10/300/200</div>
                <p style="font-size:13px;margin-top:8px">网络公共图库</p>
            </div>
            <div class="card">
                <img src="images/sample.jpg">
                <div class="path">相对路径：images/sample.jpg</div>
                <p style="font-size:13px;margin-top:8px">本地项目资源</p>
            </div>
        </div>

        <h2>最新文章</h2>
        <ul>
            <li><a href="#">Github Pages入门</a></li>
            <li><a href="#">HTML基础</a></li>
            <li><a href="#">路径使用说明</a></li>
        </ul>
    </div>
    <footer>©2025个人博客 | GitHub Pages部署</footer>
</body>
</html>
