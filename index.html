<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            border-bottom: 1px solid #eaeaea;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .sub {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 28px 0 12px;
            border-left: 3px solid #333;
            padding-left: 12px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0 10px;
        }
        .card {
            flex: 1;
            min-width: 200px;
            background: #f8f8f8;
            padding: 16px;
            border-radius: 12px;
        }
        img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }
        .path {
            font-size: 0.7rem;
            font-family: monospace;
            color: #aaa;
            margin-top: 8px;
            word-break: break-all;
        }
        ul {
            list-style: none;
            margin: 15px 0 20px;
        }
        li {
            margin: 10px 0;
        }
        a {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
        }
        a:hover {
            border-bottom-color: #333;
        }
        footer {
            text-align: center;
            padding: 30px 0 20px;
            border-top: 1px solid #eaeaea;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>随笔</h1>
        <div class="sub">记录 · 分享</div>
    </div>

    <div class="main">
        <h2>图片</h2>
        <div class="gallery">
            <div class="card">
                <img src="https://picsum.photos/id/1/300/200" alt="pic1">
                <div class="path">绝对路径 1</div>
                <img src="https://picsum.photos/id/10/300/200" alt="pic2" style="margin-top:12px;">
                <div class="path">绝对路径 2</div>
            </div>
            <div class="card">
                <img src="images/sample.jpg" alt="local" onerror="this.src='https://picsum.photos/id/20/300/200'">
                <div class="path">相对路径：images/</div>
            </div>
        </div>

        <h2>文章</h2>
        <ul>
            <li><a href="#">GitHub Pages</a></li>
            <li><a href="#">HTML 笔记</a></li>
            <li><a href="#">路径说明</a></li>
        </ul>
    </div>

    <footer>GitHub Pages · 2025</footer>
</body>
</html>
