<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人博客</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {
            max-width:800px;
            margin:30px auto;
            padding:0 15px;
            background:#f0f2f5;
            font-family: 'Roboto', sans-serif;
            color:#333;
            line-height:1.6;
        }
        a {color:#667eea; text-decoration:none;}
        a:hover {text-decoration:underline;}

        .head {
            padding:30px 20px;
            text-align:center;
            background:#667eea;
            color:#fff;
            border-radius:12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .main {
            margin-top:25px;
            padding:25px;
            background:#fff;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.03);
        }
        .img-box {
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            margin:20px 0;
        }
        .card {
            flex:1 1 300px;
            background:#fafafa;
            border-radius:10px;
            text-align:center;
            padding:15px;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
            transition:transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform:translateY(-4px);
            box-shadow:0 6px 15px rgba(0,0,0,0.1);
        }
        img {
            width:100%;
            border-radius:6px;
            margin-top:12px;
            display:block;
        }
        .path {
            font-family: 'Consolas', monospace;
            font-size:12px;
            color:#888;
            margin:6px 0;
            word-break:break-all;
        }
        h2 {
            margin-bottom:12px;
            color:#444;
            font-weight:500;
        }
        p {
            margin:8px 0;
        }
        footer {
            text-align:center;
            margin-top:30px;
            color:#999;
            font-size:14px;
        }
        ul {
            margin:12px 0 12px 20px;
        }
    </style>
</head>
<body>
    <div class="head">
        <h1>我的技术博客</h1>
        <p>学习记录与分享</p>
    </div>
    <div class="main">
        <h2>关于本站</h2>
        <p>本站基于 GitHub Pages 搭建静态博客，记录学习心得与技术分享。</p>

        <h2>图片路径演示</h2>
        <div class="img-box">
            <div class="card">
                <img src="https://picsum.photos/id/1/300/200" alt="示例图片1">
                <div class="path">绝对路径：https://picsum.photos/id/1/300/200</div>

                <img src="https://picsum.photos/id/10/300/200" alt="示例图片2">
                <div class="path">绝对路径：https://picsum.photos/id/10/300/200</div>
            </div>
            <div class="card">
                <img src="images/sample.jpg" alt="本地图片示例">
                <div class="path">相对路径：images/sample.jpg</div>
            </div>
        </div>

        <h2>最新文章</h2>
        <ul>
            <li><a href="#">Github Pages入门</a></li>
            <li><a href="#">HTML基础</a></li>
            <li><a href="#">路径使用说明</a></li>
        </ul>
    </div>
    <footer>©2025 个人博客 | GitHub Pages部署</footer>
</body>
</html>
