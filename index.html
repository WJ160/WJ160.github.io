<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 650px;
            margin: 60px auto;
            padding: 0 20px;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #222;
            line-height: 1.6;
        }
        a { color: #000; text-decoration: none; border-bottom: 1px solid #ddd; transition: all 0.2s; }
        a:hover { border-bottom-color: #000; }
        
        header { margin-bottom: 40px; }
        h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 14px; }
        
        section { margin-bottom: 40px; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
        p { font-size: 14px; color: #444; }
        
        .img-grid { display: block; margin: 15px 0; }
        .card { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .path { font-family: monospace; font-size: 11px; color: #777; margin-top: 8px; word-break: break-all; }
        
        ul { list-style: none; }
        li { margin-bottom: 10px; font-size: 14px; }
        
        footer { margin-top: 60px; font-size: 12px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>我的技术博客</h1>
        <p class="subtitle">记录与分享</p>
    </header>

    <main>
        <section>
            <h2>关于</h2>
            <p>基于 GitHub Pages 搭建的静态博客，专注技术心得与学习记录。</p>
        </section>

        <section>
            <h2>示例路径</h2>
            <div class="img-grid">
                <div class="card">
                    <img src="https://picsum.photos/id/1/300/200" alt="网络图片">
                    <div class="path">绝对路径: https://picsum.photos/id/1/300/200</div>
                </div>
                <div class="card">
                    <img src="images/sample.jpg" alt="本地图片">
                    <div class="path">相对路径: images/sample.jpg</div>
                </div>
            </div>
        </section>

        <section>
            <h2>文章</h2>
            <ul>
                <li><a href="#">Github Pages 入门</a></li>
                <li><a href="#">HTML 基础精要</a></li>
                <li><a href="#">Web 路径使用说明</a></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 个人博客 · GitHub Pages</p>
    </footer>
</body>
</html>
